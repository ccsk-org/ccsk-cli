<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="860" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="wiA" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#D97757"/>
    </marker>
  </defs>

  <rect x="2" y="2" width="896" height="376" rx="14" fill="#FAF9F7" stroke="#E7E2DC"/>
  <text x="40" y="44" font-size="21" font-weight="700" fill="#1A1A1A">What you get</text>

  <!-- before panel -->
  <rect x="40" y="74" width="250" height="270" rx="10" fill="#FFFFFF" stroke="#E7E2DC"/>
  <text x="56" y="100" font-size="12" font-weight="700" fill="#9AA0A6">BEFORE</text>
  <g font-size="13" fill="#6B7280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="56" y="134">my-app/</text>
    <text x="74" y="160">src/</text>
    <text x="74" y="186">package.json</text>
    <text x="74" y="212">README.md</text>
  </g>

  <!-- arrow -->
  <line x1="306" y1="208" x2="354" y2="208" stroke="#D97757" stroke-width="2.5" marker-end="url(#wiA)"/>
  <text x="330" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#B4502F" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">ccsk init</text>

  <!-- after: two sources -->
  <!-- plugin -->
  <rect x="370" y="74" width="490" height="120" rx="10" fill="#FFFFFF" stroke="#D97757"/>
  <text x="386" y="98" font-size="12" font-weight="700" fill="#B4502F">PLUGIN  ·  ccsk@ccsk-kit</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="386" y="124" font-size="13" font-weight="700" fill="#1A1A1A">/ccsk:plan · /ccsk:build · /ccsk:loop · …</text>
    <text x="386" y="148" font-size="12" fill="#6B7280">12 agents (ccsk:planner, ccsk:code-reviewer, …)</text>
    <text x="386" y="170" font-size="12" fill="#6B7280">15 skills (auto-activating) · 1 output-style</text>
  </g>

  <!-- materialized -->
  <rect x="370" y="206" width="490" height="138" rx="10" fill="#FFFFFF" stroke="#3F9B6B"/>
  <text x="386" y="230" font-size="12" font-weight="700" fill="#3F9B6B">IN YOUR PROJECT  ·  materialized contract</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">
    <text x="386" y="256" fill="#1A1A1A" font-weight="700">CLAUDE.md</text>
    <text x="386" y="278" fill="#1A1A1A" font-weight="700">.claude/<tspan fill="#6B7280" font-weight="400">rules · output-styles</tspan></text>
    <text x="386" y="300" fill="#1A1A1A" font-weight="700">.ccsk/<tspan fill="#6B7280" font-weight="400">  plans · journals · ADRs · MEMORY.md</tspan></text>
    <text x="386" y="322" fill="#1A1A1A" font-weight="700">docs/<tspan fill="#9AA0A6" font-weight="400">   evergreen skeleton</tspan></text>
  </g>

  <text x="450" y="366" text-anchor="middle" font-size="12" fill="#9AA0A6">The colon commands ride in the plugin; the contract + memory are materialized (gitignored by default).</text>
</svg>
